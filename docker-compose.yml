services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: dados
        uid: 1000
    container_name: dados-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    entrypoint: ["sh", "./docker/entrypoint.sh"]
    networks:
      - dados
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: dados-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dados
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: dados-mysql
    restart: unless-stopped
    ports:
      - "${DOCKER_DB_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dados}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-dados}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dados}
      MYSQL_USER: ${DB_USERNAME:-dados}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - dados

  # Queue worker — runs as www-data to avoid permission conflicts with Laravel storage/cache
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: dados
        uid: 1000
    container_name: dados-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    entrypoint: ["sh", "./docker/worker-entrypoint.sh"]
    networks:
      - dados
    depends_on:
      - mysql

  # Scheduler — roda o cron do Laravel (sync mensal do replicado, etc.)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: dados
        uid: 1000
    container_name: dados-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    entrypoint: ["sh", "./docker/scheduler-entrypoint.sh"]
    networks:
      - dados
    depends_on:
      - mysql

networks:
  dados:
    driver: bridge

volumes:
  mysql-data:
